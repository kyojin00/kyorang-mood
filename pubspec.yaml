name: kyorang_mood
description: "교랑무드 - 기분을 기록하고 나에게 맞는 것을 챙겨주는 감정 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^3.3.1

  # 로컬 저장 (Hive Community Edition - 원조 hive의 유지보수 후속)
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.1

  # Supabase (상담 Edge Function 호출용)
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/mascot/